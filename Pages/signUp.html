<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVerse - Join Us</title>
    <!-- orders styles sheets more more important  -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <!-- remix icon aw3aaaa 7d  y delete de !!!!  -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main class="main-container">
        <section class="hero-section">
            <div class="status-badge">
                <span class="dot"></span> WELCOME TO EDUNIVERSE
            </div>
            <h1>EduVerse<span>.</span><br>University</h1>
            <p class="description">
                Elevating your academic journey through innovation. Join the next generation of software engineers and
                creators in our advanced learning ecosystem.
            </p>

            <div class="social-links">
                <button id="ChangeTheme"> Change Theme ? </button>
                <div class="icons">
                    <a href="#"><i class="ri-github-fill"></i></a>
                    <a href="#"><i class="ri-linkedin-box-fill"></i></a>
                    <a href="#"><i class="ri-twitter-x-fill"></i></a>
                </div>
            </div>
        </section>

        <section class="form-section">
            <div class="content">
                <form id="signupForm" onsubmit="event.preventDefault(); signup();">
                    <h2>Create Account</h2>

                    <div class="row">
                        <div class="input-box">
                            <input type="text" id="firstName" placeholder="First Name" required />
                        </div>
                        <div class="input-box">
                            <input type="text" id="lastName" placeholder="Last Name" required />
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="text" id="signupUsername" placeholder="Username" required />
                        <i class="ri-user-3-line"></i>
                    </div>

                    <div class="input-box">
                        <input type="email" id="universityEmail" placeholder="University Email" required />
                        <i class="ri-mail-line"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="signupPassword" placeholder="Password" required />
                        <i class="ri-eye-off-line" onclick="togglePass('signupPassword', this)"></i>
                    </div>

                    <button type="submit" class="btnn">Create Account </button>
                    <p class="footer-text">Already have an account? <a href="login.html">Log in</a></p>
                    <p id="message"></p>
                </form>
            </div>
        </section>
    </main>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/theme.js"></script>
</body>

</html>
